<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>example_use 最小前端</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f8fafc; color: #111827; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { margin-bottom: 8px; }
    .hint { color: #4b5563; margin-bottom: 16px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; margin-bottom: 14px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    input { padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 8px; min-width: 220px; }
    button { padding: 8px 12px; border: 0; border-radius: 8px; background: #2563eb; color: #fff; cursor: pointer; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    pre { background: #0b1020; color: #d1fae5; padding: 12px; border-radius: 8px; overflow-x: auto; min-height: 120px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>example_use 最小前端案例</h1>
    <div class="hint">流程：注册 -> 登录 -> 查看 Provider -> 创建知识图谱</div>

    <div class="card">
      <div class="row">
        <input id="baseUrl" value="http://127.0.0.1:8000/api" />
        <button id="btnPing">检查后端</button>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <input id="username" placeholder="用户名（留空自动生成）" />
        <input id="password" value="ExamplePass123!" placeholder="密码" />
      </div>
      <div class="row">
        <button id="btnRegister">1) 注册</button>
        <button id="btnLogin">2) 登录</button>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <button id="btnProviders">3) 查看Provider列表</button>
        <button id="btnCreateGraph">4) 创建知识图谱</button>
        <button id="btnNeo4jTest">5) 测试Neo4j连接</button>
        <button id="btnUpload">6) 上传文件到图谱（MinIO）</button>
      </div>
      <div class="row">
        <input id="graphId" placeholder="图谱ID（创建后自动填充）" />
        <input id="uploadText" value="hello graph from frontend example" placeholder="上传文本内容" />
      </div>
      <div class="row">
        <button id="btnRunAll">一键最小流程</button>
      </div>
    </div>

    <pre id="log"></pre>
  </div>

  <script>
    const logEl = document.getElementById("log");
    const state = { token: "", seed: Date.now(), graphId: "" };

    const getBase = () => document.getElementById("baseUrl").value.replace(/\/+$/, "");
    const getUsername = () => {
      const el = document.getElementById("username");
      if (!el.value.trim()) el.value = `example_user_${Date.now()}`;
      return el.value.trim();
    };
    const getPassword = () => document.getElementById("password").value;

    const log = (title, data) => {
      const txt = typeof data === "string" ? data : JSON.stringify(data, null, 2);
      logEl.textContent += `[${new Date().toLocaleTimeString()}] ${title}\n${txt}\n\n`;
      logEl.scrollTop = logEl.scrollHeight;
    };

    const headers = () => state.token ? { Authorization: `Bearer ${state.token}` } : {};

    async function req(method, path, body, needAuth=false) {
      const res = await fetch(`${getBase()}${path}`, {
        method,
        headers: { "Content-Type": "application/json", ...(needAuth ? headers() : {}) },
        body: body ? JSON.stringify(body) : undefined
      });
      const text = await res.text();
      let json = null;
      try { json = JSON.parse(text); } catch {}
      return { status: res.status, body: json ?? text };
    }

    document.getElementById("btnPing").onclick = async () => {
      try {
        const r = await req("GET", "/models/providers");
        log("检查后端", r);
      } catch (e) {
        log("检查后端失败", String(e));
      }
    };

    async function doRegister() {
      const username = getUsername();
      const password = getPassword();
      const body = {
        username,
        password,
        name: "Example User",
        email: `${username}@example.com`,
        role: "admin"
      };
      const r = await req("POST", "/auth/register", body);
      log("注册", r);
      return r;
    }
    document.getElementById("btnRegister").onclick = doRegister;

    async function doLogin() {
      const body = { username: getUsername(), password: getPassword(), remember: false };
      const r = await req("POST", "/auth/login", body);
      if (r.status === 200 && r.body?.data?.token) state.token = r.body.data.token;
      log("登录", { ...r, token_set: !!state.token });
      return r;
    }
    document.getElementById("btnLogin").onclick = doLogin;

    document.getElementById("btnProviders").onclick = async () => {
      const r = await req("GET", "/models/providers");
      log("Provider列表", r);
    };

    async function doCreateGraph() {
      const body = {
        name: `示例图谱_${state.seed}`,
        description: "example_use 前端最小案例创建",
        config: { from: "example_use_frontend" }
      };
      const r = await req("POST", "/graphs/", body, true);
      log("创建图谱", r);
      if (r.status === 200 && r.body?.data?.id) {
        state.graphId = r.body.data.id;
        document.getElementById("graphId").value = state.graphId;
      }
      return r;
    }
    document.getElementById("btnCreateGraph").onclick = doCreateGraph;

    document.getElementById("btnNeo4jTest").onclick = async () => {
      const graphId = document.getElementById("graphId").value.trim() || state.graphId;
      if (!graphId) return log("测试Neo4j连接", "请先创建知识图谱");
      const r = await req("POST", `/graphs/${graphId}/neo4j-test`, null, true);
      log("测试Neo4j连接", r);
    };

    document.getElementById("btnUpload").onclick = async () => {
      const graphId = document.getElementById("graphId").value.trim() || state.graphId;
      if (!graphId) return log("上传文件", "请先创建知识图谱");
      if (!state.token) return log("上传文件", "请先登录");
      const text = document.getElementById("uploadText").value || "hello graph";
      const form = new FormData();
      const blob = new Blob([text], { type: "text/plain" });
      form.append("files", blob, "example.txt");
      const res = await fetch(`${getBase()}/graphs/${graphId}/files/upload`, {
        method: "POST",
        headers: { Authorization: `Bearer ${state.token}` },
        body: form
      });
      const bodyText = await res.text();
      let body = bodyText;
      try { body = JSON.parse(bodyText); } catch {}
      log("上传文件到图谱（MinIO）", { status: res.status, body });
    };

    document.getElementById("btnRunAll").onclick = async () => {
      log("一键最小流程", "开始执行");
      const r1 = await doRegister();
      if (r1.status !== 200 && !String(r1.body).includes("已存在")) {
        return log("一键最小流程", "注册失败，结束");
      }
      const r2 = await doLogin();
      if (r2.status !== 200) return log("一键最小流程", "登录失败，结束");
      await document.getElementById("btnProviders").onclick();
      const r4 = await doCreateGraph();
      if (r4.status !== 200) return log("一键最小流程", "创建图谱失败，结束");
      await document.getElementById("btnNeo4jTest").onclick();
      await document.getElementById("btnUpload").onclick();
      log("一键最小流程", "执行完成");
    };
  </script>
</body>
</html>
