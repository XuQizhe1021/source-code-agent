<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CogmAIt API 测试插件</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <h1>CogmAIt API 测试插件</h1>
    <p class="sub">勾选接口 -> 点击执行 -> 查看可收纳结果（可删除）</p>

    <section class="panel">
      <div class="row">
        <label>Base URL</label>
        <input id="baseUrl" value="http://127.0.0.1:8000/api" />
      </div>
      <div class="row">
        <label>用户名前缀</label>
        <input id="usernamePrefix" value="testapi_user" />
      </div>
      <div class="row">
        <label>密码</label>
        <input id="password" value="TestApiPass123!" />
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <button id="checkAll">全选</button>
        <button id="uncheckAll">全不选</button>
        <button id="runSelected" class="primary">执行所选测试</button>
        <button id="clearResults">清空结果</button>
      </div>
      <div id="testList" class="test-list"></div>
    </section>

    <section class="panel">
      <h2>测试结果</h2>
      <div id="summary" class="summary">尚未执行</div>
      <div id="results"></div>
    </section>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
